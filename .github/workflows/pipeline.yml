name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Create artifact
        run: |
          mkdir -p dist
          echo "Build version: ${{ github.sha }}" > dist/artifact.txt
          echo "Build date: $(date)" >> dist/artifact.txt
          cat dist/artifact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/artifact.txt

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          cat artifact.txt
          echo "Staging deploy complete!"

  verify_staging:
    name: Verify Staging
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run smoke tests
        run: |
          python -c "
          print('Running smoke tests...')
          assert 1 == 2, 'Basic check failed'
          print('Smoke test passed!')
          "

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: verify_staging
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          cat artifact.txt
          echo "Production deploy complete!"
